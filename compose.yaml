# Generated by setupmc.com on 2026-01-25T22:03:06.150Z

services:
  mc:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      TZ: "America/Toronto"
      CF_API_KEY_FILE: /run/secrets/cf_api_key
      VERSION: "1.21.11"
      WORLD: "/worlds/cusec-mc-archive.zip"
      OPS: |
        Marshmallows7920
        Calm611
        Chopstx3
        VentusAurum
      SPIGET_RESOURCES: "\
        59773,\
        60088,\
        34315,\
        116202,\
        28140,\
        29999\
        "
      PLUGINS: |-
        https://github.com/dmulloy2/ProtocolLib/releases/latest/download/ProtocolLib.jar  
    secrets:
      - cf_api_key
    volumes:
      - "/cusec-mc/data:/data"
      - "/cusec-mc/plugins:/plugins"
      - "/cusec-mc/mods:/mods"
      - "/cusec-mc/worlds:/worlds"
  restore-backup:
    # Same image as mc, but any base image with bash and tar will work
    image: itzg/mc-backup
    restart: "no"
    entrypoint: restore-tar-backup
    volumes:
      # Must be same mount as mc service, needs to be writable
      - /cusec-mc/data:/data
      # Must be same mount as backups service, but can be read-only
      - /cusec-mc/backups:/backups:ro
  backups:
    image: itzg/mc-backup
    depends_on:
      mc:
        condition: service_healthy
    environment:
      BACKUP_INTERVAL: "2h"
      RCON_HOST: mc
      # since this service waits for mc to be healthy, no initial delay is needed
      INITIAL_DELAY: 0
      PAUSE_IF_NO_PLAYERS: True
      
    volumes:
      - /cusec-mc/data:/data:ro
      - /cusec-mc/backups:/backups


secrets:
  cf_api_key:
    file: /curseforge_api_key.txt
